name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          staging="fad-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/fad" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            fad-*.tar.gz
            fad-*.tar.gz.sha256

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Render formula from release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.sha256' --dir sha
          sha() { awk '{print $1}' "sha/fad-${TAG}-$1.tar.gz.sha256"; }
          sed \
            -e "s/@@VERSION@@/${version}/g" \
            -e "s/@@SHA_DARWIN_ARM@@/$(sha aarch64-apple-darwin)/" \
            -e "s/@@SHA_DARWIN_INTEL@@/$(sha x86_64-apple-darwin)/" \
            -e "s/@@SHA_LINUX_ARM@@/$(sha aarch64-unknown-linux-gnu)/" \
            -e "s/@@SHA_LINUX_INTEL@@/$(sha x86_64-unknown-linux-gnu)/" \
            .github/homebrew/fad.rb > formula.rb
      - name: Generate a token for the tap
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: ntsk
          repositories: homebrew-tap
      - name: Check out the Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: ntsk/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: tap
      - name: Copy formula into the tap
        run: cp formula.rb tap/Formula/fad.rb
      - name: Open a pull request on the tap
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: tap
          branch: bump-fad-${{ github.ref_name }}
          title: "Update fad to ${{ github.ref_name }}"
          commit-message: "Update fad to ${{ github.ref_name }}"
          body: "Automated formula update for fad ${{ github.ref_name }}."
          delete-branch: true
